version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENV=${ENV:-production}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - API_ADMIN_USER=${API_ADMIN_USER:-admin}
      - API_ADMIN_PASSWORD=${API_ADMIN_PASSWORD}
      - DB_PATH=${DB_PATH:-/app/data/persistent/predictions.db}
    volumes:
      - db-data:/app/data/persistent
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
      - API_ADMIN_USER=${API_ADMIN_USER:-admin}
      - API_ADMIN_PASSWORD=${API_ADMIN_PASSWORD}
      - DB_PATH=${DB_PATH:-/app/data/persistent/predictions.db}
    volumes:
      - db-data:/app/data/persistent
    depends_on:
      - api
    restart: unless-stopped

volumes:
  db-data:
